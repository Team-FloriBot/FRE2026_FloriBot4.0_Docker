/**
Detector node parameter overview
- Use this YAML as input to ros2 when launching, e.g.
  ros2 run ros2_detection detector_node --ros-args --params-file params/detector_params.yaml

Fields and description:
model_type: string - model backend/type (e.g. "yolo", "rcnn")
model_path: string - path to model file on disk (relative to package or absolute)
classes: list - list of class names to search for (empty = all available from model)
confidence: float - default detection confidence threshold (0..1)
max_detections: int - maximum number of detections to return

use_decimation/use_spatial/use_temporal/use_hole_filling/use_mask_filter: booleans - pre/post filters

use_realsense_ros_wrapper: bool - whether a ROS wrapper publishes RGBD frames
rgbd_topics: list - RGBD input topics from the ROS wrapper (latest received frame is used)
color_resolution_width/height: int - color capture resolution used when initializing camera
fps: int - target FPS for the detection loop
depth_scale_override: float - set to >0 to force a depth scale (meters per unit)

publish_annotated_image: bool - enable annotated image publisher
annotated_image_topic: string - topic name for annotated images
results_topic: string - topic name for detection results
status_topic: string - topic for status messages

Example values below:
*/

/detector_node:
  ros__parameters:
    model_type: "yolo"
    model_path: "/models/yolo26n_jutestripe_yellowpaper-seg.pt"
    classes: []

    confidence: 0.45
    max_detections: 40

    use_decimation: false
    use_spatial: true
    use_temporal: true
    use_hole_filling: false
    use_mask_filter: true

    use_realsense_ros_wrapper: true
    rgbd_topics: ["/sensors/realsense_rear/rgbd"]
    rgbd_topic: "/sensors/realsense_rear/rgbd"
    color_resolution_width: 640
    color_resolution_height: 480
    fps: 30
    depth_scale_override: 0.0

    publish_annotated_image: true
    annotated_image_topic: "/detector/annotated_image"
    results_topic: "/detector/results"
    status_topic: "/detector/status"

/sensors/realsense_front:
  ros__parameters:
    enable_color: true
    enable_depth: true
    enable_infra: false
    enable_infra1: false
    enable_infra2: false

    enable_rgbd: true
    enable_sync: true

    align_depth.enable: true

    rgb_camera.color_profile: "640x480x30"
    rgb_camera.color_format: "RGB8"

    depth_module.depth_profile: "640x480x30"
    depth_module.depth_format: "Z16"

    pointcloud.enable: false

    publish_tf: false
    tf_publish_rate: 0.0

    initial_reset: true
    reconnect_timeout: 6.0

    diagnostics_period: 1.0

    spatial_filter.enable: true
    temporal_filter.enable: true
    hole_filling_filter.enable: false
    decimation_filter.enable: false
