services:
  floribot-base:
    profiles: ["robot", "base", "ui"]
    build:
      context: ..
      dockerfile: base/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-base
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    restart: unless-stopped

  floribot-base-sim:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: base/Dockerfile
    container_name: floribot-base-sim
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    command:
      - bash
      - -lc
      - |
          exec ros2 launch base base_node.launch.py
    restart: unless-stopped

  floribot-sensors:
    profiles: ["robot", "sensors"]
    build:
      context: ..
      dockerfile: sensors/Dockerfile
    container_name: floribot-sensors
    platform: linux/arm64
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}

      SICK_LAUNCH_FILE: ${SICK_LAUNCH_FILE:-sick_tim_5xx.launch.py}
      SICK_FRONT_IP: ${SICK_FRONT_IP:-192.168.0.52}
      SICK_REAR_IP: ${SICK_REAR_IP:-192.168.0.51}
      SICK_FRONT_FRAME: ${SICK_FRONT_FRAME:-sick_front_link}
      SICK_REAR_FRAME: ${SICK_REAR_FRAME:-sick_rear_link}

      RS_FRONT_SERIAL: ${RS_FRONT_SERIAL:-}
      RS_REAR_SERIAL: ${RS_REAR_SERIAL:-}

      XSENS_ENABLE: ${XSENS_ENABLE:-true}
      XSENS_SCAN_FOR_DEVICES: ${XSENS_SCAN_FOR_DEVICES:-true}
      XSENS_PORT: ${XSENS_PORT:-/dev/ttyUSB0}
      XSENS_BAUDRATE: ${XSENS_BAUDRATE:-115200}
      XSENS_FRAME_ID: ${XSENS_FRAME_ID:-xsens_mti_link}
      XSENS_NAMESPACE: ${XSENS_NAMESPACE:-/sensors/xsens}
      XSENS_LOG_LEVEL: ${XSENS_LOG_LEVEL:-info}

    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    command:
      - /start_sensors.sh
    restart: unless-stopped

  floribot-webteleop:
    profiles: ["webteleop", "ui"]
    build:
      context: ..
      dockerfile: webteleop/Dockerfile
    container_name: floribot-webteleop
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    restart: unless-stopped

  floribot-stage:
    profiles: ["stage"]
    build:
      context: ..
      dockerfile: stage/Dockerfile
    container_name: floribot-stage
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped

  floribot-gazebo:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-gazebo
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      __GLX_VENDOR_LIBRARY_NAME: nvidia

      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes:/ws/src/robot_description:/ws/src/robot_description/meshes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  floribot-sim-backend:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-sim-backend
    network_mode: host
    ipc: host
    pid: host
    depends_on:
      - floribot-base-sim
      - floribot-gazebo
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command:
      - bash
      - -lc
      - |
          source /ws/install/setup.bash

          ros2 run ros_gz_bridge parameter_bridge \
            /sim/joint_frontLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_frontRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sensors/scan_front@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/scan_rear@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/realsense_front/color/image_raw@sensor_msgs/msg/Image@gz.msgs.Image \
            /sensors/realsense_rear/color/image_raw@sensor_msgs/msg/Image@gz.msgs.Image &

          exec ros2 run sim_backend sim_backend_node
    restart: unless-stopped

  floribot-mapping:
    profiles: ["sim", "stage", "robot", "mapping", "tasks"]
    build:
      context: ..
      dockerfile: mapping/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-mapping
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    restart: unless-stopped

  floribot-tasks:
    profiles: ["sim", "stage", "tasks", "robot"]
    build:
      context: ..
      dockerfile: tasks/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-tasks
    network_mode: host
    ipc: host
    pid: host
    depends_on:
      - floribot-mapping
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    restart: unless-stopped

  floribot-object-detection:
    profiles: ["robot", "object-detection"]
    build:
      context: ..
      dockerfile: object_detection/Dockerfile
      args:
        OBJECT_DETECTION_BRANCH: docker_ros2
    container_name: floribot-object-detection
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    runtime: nvidia
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      ULTRALYTICS_CONFIG_DIR: /tmp
      YOLO_CONFIG_DIR: /tmp
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command:
      - bash
      - -lc
      - >
        source /opt/ros/humble/setup.bash &&
        source /ws/install/setup.bash &&
        python3 -c "import torch; print('CUDA available:', torch.cuda.is_available())" &&
        echo "AMENT_PREFIX_PATH=$AMENT_PREFIX_PATH" &&
        echo "Available detection packages:" &&
        ros2 pkg list | grep detection &&
        exec ros2 launch ros2_detection detector.launch.py
    restart: unless-stopped

  floribot-rviz:
    profiles: ["rviz"]
    build:
      context: ..
      dockerfile: rviz/Dockerfile
    container_name: floribot-rviz
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}

      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      QT_X11_NO_MITSHM: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
    stdin_open: true
    tty: true
