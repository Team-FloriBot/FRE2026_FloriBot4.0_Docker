/**:
  ros__parameters:
    input_topic: /sensors/robosense/front/points

    aligned_topic: /sensors/robosense/front/aligned_points
    ground_topic: /sensors/robosense/front/ground_points
    nonground_topic: /sensors/robosense/front/nonground_points
    crop_topic: /sensors/robosense/front/crop_points
    obstacle_topic: /sensors/robosense/front/obstacle_points
    aligned2d_topic: /sensors/robosense/front/aligned_points_2d
    ground2d_topic: /sensors/robosense/front/ground_points_2d
    nonground2d_topic: /sensors/robosense/front/nonground_points_2d
    crop2d_topic: /sensors/robosense/front/crop_points_2d
    obstacle2d_topic: /sensors/robosense/front/obstacle_points_2d

    parent_frame: base_footprint
    sensor_frame: robosense_front_link
    mount_z: 0.955
    
    roi_x_min: 0.5
    roi_x_max: 8.0
    roi_y_min: -5.0
    roi_y_max: 5.0
    roi_z_min: -3.0
    roi_z_max: 2.0

    grid_resolution: 0.10
    min_points_per_cell: 1
    base_ground_threshold: 0.06
    distance_threshold_coeff: 0.01
    negative_outlier_threshold: 0.20
    min_valid_neighbors: 2

    publish_aligned_cloud: false
    publish_ground_cloud: false
    publish_ground_scan: true
    publish_nonground_cloud: true
    publish_nonground_scan: true
    publish_crop_cloud: true
    publish_crop_scan: true
    publish_obstacle_cloud: false
    publish_obstacle_scan: false
