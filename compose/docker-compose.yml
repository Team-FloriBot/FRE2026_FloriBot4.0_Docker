services:
  floribot-base:
    profiles: ["robot"]
    build:
      context: ..
      dockerfile: base/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
        - ROBOT_LOCALIZATION_SHA=${ROBOT_LOCALIZATION_SHA:-3efa714fb9c1ff40966327b7bed7053b2570be4d}
    container_name: floribot-base
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}
      LOCALIZATION_CONFIG: ${LOCALIZATION_CONFIG:-/ws/config/localization/local_ekf.yaml}
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro
      - ../base/config_ekf/local_ekf.yaml:/ws/config/localization/local_ekf.yaml:ro
    restart: unless-stopped

  floribot-base-sim:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: base/Dockerfile
    container_name: floribot-base-sim
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    command:
      - bash
      - -lc
      - |
          exec ros2 launch base base_node.launch.py
    restart: unless-stopped

  floribot-sensors:
    profiles: ["robot"]
    build:
      context: ..
      dockerfile: sensors/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-sensors
    platform: linux/arm64
    network_mode: host
    ipc: host
    pid: host
    privileged: true

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      SICK_LAUNCH_FILE: ${SICK_LAUNCH_FILE:-sick_tim_5xx.launch.py}
      SICK_FRONT_IP: ${SICK_FRONT_IP:-192.168.0.52}
      SICK_REAR_IP: ${SICK_REAR_IP:-192.168.0.51}
      SICK_FRONT_FRAME: ${SICK_FRONT_FRAME:-sick_front_link}
      SICK_REAR_FRAME: ${SICK_REAR_FRAME:-sick_rear_link}

      RS_FRONT_SERIAL: ${RS_FRONT_SERIAL:-}
      RS_REAR_SERIAL: ${RS_REAR_SERIAL:-}
      RS_FRONT_CONFIG_FILE: ${RS_FRONT_CONFIG_FILE:-/etc/floribot/object_detection/realsense_front.yaml}

      XSENS_ENABLE: ${XSENS_ENABLE:-true}
      XSENS_SCAN_FOR_DEVICES: ${XSENS_SCAN_FOR_DEVICES:-true}
      XSENS_PORT: ${XSENS_PORT:-/dev/ttyUSB0}
      XSENS_BAUDRATE: ${XSENS_BAUDRATE:-115200}
      XSENS_FRAME_ID: ${XSENS_FRAME_ID:-xsens_mti_link}
      XSENS_NAMESPACE: ${XSENS_NAMESPACE:-/sensors/xsens}
      XSENS_LOG_LEVEL: ${XSENS_LOG_LEVEL:-info}

    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro

      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

      - ../sensors/config_imu/xsens_mti_node.yaml:/ws/install/xsens_mti_ros2_driver/share/xsens_mti_ros2_driver/param/xsens_mti_node.yaml:ro


      - ../sensors/config_realsense/realsense_front.yaml:/etc/floribot/realsense/realsense_front.yaml:ro
      - ../sensors/config_realsense/realsense_front.yaml:/etc/floribot/object_detection/realsense_front.yaml:ro


    command:
      - /start_sensors.sh

    restart: unless-stopped

  floribot-pantilt:
    profiles: ["laptop"]
    build:
      context: ..
      dockerfile: pantilt/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
        - PANTILT_REPO=${PANTILT_REPO:-https://github.com/Team-FloriBot/PANTILT_ROS2_Jazzy.git}
        - PANTILT_REF=${PANTILT_REF:-main}
        - FLIR_PTU_DRIVER_REPO=${FLIR_PTU_DRIVER_REPO:-https://github.com/vicoslab/flir_ptu_driver.git}
        - FLIR_PTU_DRIVER_REF=${FLIR_PTU_DRIVER_REF:-ros2}
        - FLIR_PTU_DRIVER_SHA=${FLIR_PTU_DRIVER_SHA:-69bdda85a52eac2f16a34ec2f390671f0596412f}
    container_name: floribot-pantilt
    network_mode: host
    ipc: host
    pid: host
    privileged: true

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      PTU_PORT: ${PTU_PORT:-/dev/ttyUSB0}
      PANTILT_LAUNCH_FILE: ${PANTILT_LAUNCH_FILE:-aim_and_fire.launch.py}
      PANTILT_DRIVER_ENABLE: ${PANTILT_DRIVER_ENABLE:-true}

    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

    command:
      - /start_pantilt.sh

    restart: unless-stopped

  floribot-robosense:
    profiles: ["robot"]
    build:
      context: ..
      dockerfile: robosense/Dockerfile
      args:
        - ROBOSENSE_REF=${ROBOSENSE_REF:-parameter_test_feld}
    container_name: floribot-robosense
    network_mode: host
    ipc: host
    pid: host

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      ROBOSENSE_FRONT_IP: ${ROBOSENSE_FRONT_IP:-192.168.1.200}
      ROBOSENSE_REAR_IP: ${ROBOSENSE_REAR_IP:-192.168.2.201}
      RSLIDAR_FRONT_CONFIG: ${RSLIDAR_FRONT_CONFIG:-/etc/floribot/robosense/rslidar_front.yaml}
      RSLIDAR_REAR_CONFIG: ${RSLIDAR_REAR_CONFIG:-/etc/floribot/robosense/rslidar_rear.yaml}
      GROUND_SEGMENTATION_ENABLE: ${GROUND_SEGMENTATION_ENABLE:-true}
      POINTCLOUD_TO_LASERSCAN_ENABLE: ${POINTCLOUD_TO_LASERSCAN_ENABLE:-true}

    volumes:
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

    command:
      - /start_robosense.sh

    restart: unless-stopped

  floribot-gps:
    profiles: ["laptop"]
    build:
      context: ..
      dockerfile: gps/Dockerfile
      args:
        - UBLOX_REPOSITORY=${UBLOX_REPOSITORY:-https://github.com/KumarRobotics/ublox.git}
        - UBLOX_BRANCH=${UBLOX_BRANCH:-ros2}
    container_name: floribot-gps
    network_mode: host
    ipc: host
    pid: host
    privileged: true

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      GPS_PORT: ${GPS_PORT:-auto}
      GPS_DEVICE_PATTERN: ${GPS_DEVICE_PATTERN:-u-blox|ublox|ardusimple|zed|f9p|gnss|gps}
      GPS_CONFIG_FILE: ${GPS_CONFIG_FILE:-/etc/floribot/gps/zed_f9p_rover.yaml}

      GPS_NODE_NAME: ${GPS_NODE_NAME:-ublox_gps_node}
      GPS_FRAME_ID: ${GPS_FRAME_ID:-gps_link}
      GPS_RATE: ${GPS_RATE:-10.0}
      GPS_NAV_RATE: ${GPS_NAV_RATE:-1}
      GPS_DYNAMIC_MODEL: ${GPS_DYNAMIC_MODEL:-automotive}

      GPS_FIX_TOPIC: ${GPS_FIX_TOPIC:-/sensors/gps/fix}
      GPS_VEL_TOPIC: ${GPS_VEL_TOPIC:-/sensors/gps/fix_velocity}

      GPS_SCAN_INTERVAL_SEC: ${GPS_SCAN_INTERVAL_SEC:-2}
      GPS_RESTART_DELAY_SEC: ${GPS_RESTART_DELAY_SEC:-2}

      NAVSAT_ENABLE: ${NAVSAT_ENABLE:-false}
      NAVSAT_FREQUENCY: ${NAVSAT_FREQUENCY:-30.0}
      NAVSAT_DELAY: ${NAVSAT_DELAY:-1.0}
      NAVSAT_MAGNETIC_DECLINATION_RAD: ${NAVSAT_MAGNETIC_DECLINATION_RAD:-0.0}
      NAVSAT_YAW_OFFSET_RAD: ${NAVSAT_YAW_OFFSET_RAD:-0.0}
      NAVSAT_ZERO_ALTITUDE: ${NAVSAT_ZERO_ALTITUDE:-true}
      NAVSAT_PUBLISH_FILTERED_GPS: ${NAVSAT_PUBLISH_FILTERED_GPS:-true}
      NAVSAT_USE_ODOMETRY_YAW: ${NAVSAT_USE_ODOMETRY_YAW:-false}
      NAVSAT_WAIT_FOR_DATUM: ${NAVSAT_WAIT_FOR_DATUM:-false}
      NAVSAT_BROADCAST_UTM_TRANSFORM: ${NAVSAT_BROADCAST_UTM_TRANSFORM:-false}
      NAVSAT_BROADCAST_UTM_TRANSFORM_AS_PARENT_FRAME: ${NAVSAT_BROADCAST_UTM_TRANSFORM_AS_PARENT_FRAME:-false}
      NAVSAT_TRANSFORM_TIMEOUT: ${NAVSAT_TRANSFORM_TIMEOUT:-0.2}

      NAVSAT_IMU_TOPIC: ${NAVSAT_IMU_TOPIC:-/imu/data}
      NAVSAT_ODOM_FILTERED_TOPIC: ${NAVSAT_ODOM_FILTERED_TOPIC:-/odometry/filtered}
      NAVSAT_ODOM_GPS_TOPIC: ${NAVSAT_ODOM_GPS_TOPIC:-/odometry/gps}
      NAVSAT_FILTERED_GPS_TOPIC: ${NAVSAT_FILTERED_GPS_TOPIC:-/gps/filtered}

    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

    command:
      - /start_gps.sh

    restart: unless-stopped

  floribot-webteleop:
    profiles: ["robot", "stage"]
    build:
      context: ..
      dockerfile: webteleop/Dockerfile
    container_name: floribot-webteleop
    network_mode: host
    ipc: host
    pid: host

    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

    volumes:
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

    restart: unless-stopped

  floribot-stage:
    profiles: ["stage"]
    build:
      context: ..
      dockerfile: stage/Dockerfile
    container_name: floribot-stage
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      STAGE_WORLD: ${STAGE_WORLD:-maize_field}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped

  floribot-gazebo:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-gazebo
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,graphics,utility

      GZ_SIM_SYSTEM_PLUGIN_PATH: /opt/ros/jazzy/lib
      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../gazebo/worlds:/ws/worlds:ro

    command:
      - bash
      - -lc
      - |
          source /ws/install/setup.bash

          ros2 launch ros_gz_sim gz_sim.launch.py \
            gz_args:="/ws/worlds/maize_field.sdf -r" &

          exec ros2 launch floribot_gz_description spawn_robot.launch.py
    restart: unless-stopped

  floribot-gazebo-bridge:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-gazebo-bridge
    network_mode: host
    ipc: host
    pid: host
    depends_on:
      - floribot-gazebo
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command:
      - bash
      - -lc
      - |
          source /ws/install/setup.bash

          ros2 run ros_gz_bridge parameter_bridge \
            /sim/joint_frontLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_frontRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sensors/scan_front@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/scan_rear@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/realsense_front/color/image_raw@sensor_msgs/msg/Image@gz.msgs.Image \
            /sensors/realsense_rear/color/image_raw@sensor_msgs/msg/Image@gz.msgs.Image &

          exec ros2 run sim_backend sim_backend_node
    restart: unless-stopped

  floribot-mapping:
    profiles: ["sim", "stage", "laptop"]
    build:
      context: ..
      dockerfile: mapping/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-mapping
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}
    restart: unless-stopped
    volumes:
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro

  floribot-tasks:
    profiles: ["sim", "stage", "laptop"]
    build:
      context: ..
      dockerfile: tasks/Dockerfile
      args:
        - CACHEBUST=${BUILD_DATE:-1}
    container_name: floribot-tasks
    network_mode: host
    ipc: host
    pid: host
    depends_on:
      - floribot-mapping
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    restart: unless-stopped
    volumes:
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro
      - ../tasks/audio/asound.conf:/etc/asound.conf:ro

  floribot-object-detection:
    profiles: ["laptop"]
    build:
      context: ..
      dockerfile: object_detection/Dockerfile
    container_name: floribot-object-detection
    network_mode: host
    ipc: host
    pid: host
    gpus: all
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      ULTRALYTICS_CONFIG_DIR: /tmp
      YOLO_CONFIG_DIR: /tmp
      DETECTOR_CONFIG_FILE: ${DETECTOR_CONFIG_FILE:-/etc/floribot/object_detection/detector_params.yaml}
      DETECTOR_RGBD_TOPIC: ${DETECTOR_RGBD_TOPIC:-/sensors/realsense_front/rgbd}
    volumes:
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro
      - ../object_detection/model:/models
      - ../object_detection/config/detector_params.yaml:/etc/floribot/object_detection/detector_params.yaml:ro
    command:
      - /start_object_detection.sh
    restart: unless-stopped

  floribot-rviz:
    profiles: ["rviz"]
    build:
      context: ..
      dockerfile: rviz/Dockerfile
    container_name: floribot-rviz
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      CYCLONEDDS_URI: ${CYCLONEDDS_URI}

      DISPLAY: ${DISPLAY}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      QT_X11_NO_MITSHM: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - /dev/dri:/dev/dri
      - ./${CYCLONEDDS_CONFIG}_cyclonedds.xml:/etc/cyclonedds/cyclonedds.xml:ro
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
