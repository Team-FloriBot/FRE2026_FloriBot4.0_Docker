task4_brain:
  ros__parameters:
    # Feld startet beim Roboter (0,0) und geht 10 Meter nach vorne (X) 
    # und spannt sich 5 Meter nach links und rechts auf (Y)
    polygon_coords: [0.0, 0.0, 5.0, 0.0, 5.0, 5.0, 0.0, 5.0]
    
    # Frames für die Transformation
    input_frame: "base_link"
    target_frame: "map"
    
    # Roboter & Feldkonfiguration
    operating_width: 1.0
    robot_width: 0.42
    turn_radius: 0.37
    headland_width: 1.0

    # Rueckkehrpunkt von Fields2Cover entfernen, wenn er nahe am Startpunkt liegt.
    return_start_tolerance_m: 0.15

    # Schussplanung: Winkel relativ zu base_link, 0 deg = +x nach vorne,
    # positive Winkel gegen den Uhrzeigersinn Richtung +y.
    shooting_range_m: 9.0
    shoot_angle_min_deg: 20.0
    shoot_angle_max_deg: 160.0
    min_navigation_segment_m: 0.05

    # Tracker und Detector Konfiguration
    tracked_objects_topic: "/tracker/tracked_objects"
    tracker_active_topic: "/tracker/active"
    tracker_reset_service: "/tracker/reset"
    detector_enabled: true
    detector_required: false
    detector_namespace: "/detector"
    detector_model_path: "/models/yolo26n_soilspot-seg.pt"
    detector_classes: []
    detector_confidence: 0.5
    detector_model_type: "yolo"
    detector_use_realsense_ros_wrapper: true
    detector_use_decimation: false
    detector_use_spatial: false
    detector_use_temporal: true
    detector_use_hole_filling: true
    detector_use_mask_filter: true
    detector_color_resolution_width: 640
    detector_color_resolution_height: 480
    detector_fps: 30
    detector_rcnn_class_names: []
    detector_service_timeout_sec: 10.0
    detector_release_after_coverage: false

    # ROS-Schnittstellen
    plan_topic: "/plan"
    polygon_marker_topic: "/task4/coverage_polygon_marker"
    shooting_marker_topic: "/task4/shooting_markers"
    pure_pursuit_set_active_service: "/pure_pursuit_node/set_active"
    pure_pursuit_status_topic: "/pure_pursuit_node/status"
    aim_target_topic: "/target_point"
    aim_target_frame: "base_link"
    aim_target_interval_sec: 5.0
    tf_timeout_sec: 0.5

    # Scanhöhe des externen pointcloud_to_laserscan-Knotens.
    # Die Werte werden beim Aufruf von /task4/plan_coverage gesetzt,
    # bevor die Coverage-Planung beginnt.
    pointcloud_height_update_enabled: true
    pointcloud_to_laserscan_node: "/pointcloud_to_laserscan"
    pointcloud_min_height: 0.15
    pointcloud_max_height: 0.8
    pointcloud_parameter_timeout_sec: 2.0

    # true: Die Coverage-Planung schlägt fehl, wenn die Parameter nicht gesetzt
    # werden können. false: Nur Warnung ausgeben und trotzdem planen.
    pointcloud_height_update_required: true
